<!DOCTYPE html>
<html>
<head>
<title>She Safe</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff758c, #ff7eb3, #a18cd1);
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 160px;
    border-radius: 15px;
    object-fit: cover;
}

/* SAFE TEXT */
.safe {
    color: #00ffcc;
    font-weight: bold;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: #ff1e6b;
    border: none;
    border-radius: 10px;
    color: white;
    margin-top: 10px;
    cursor: pointer;
}

.no-data {
    text-align: center;
    margin-top: 30px;
}
</style>
</head>

<body>

<div class="header">

<p id="cityName"></p>
